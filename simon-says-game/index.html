<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Simon Says Game</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1>Simon Says Game</h1>

        <h2 id="status" class="hidden"></h2>

        <h3 id="message">Press any key to start the game</h3>

        <div class="btn-container">
            <div class="line-one">
                <div class="btn one" id="one"></div>
                <div class="btn two" id="two"></div>
            </div>
            <div class="line-two">
                <div class="btn three" id="three"></div>
                <div class="btn four" id="four"></div>
            </div>
        </div>

        <script src="app.js"></script>
    </body>
</html>
